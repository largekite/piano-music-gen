name: PianoMusicGen
options:
  bundleIdPrefix: com.pianomusicgen
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  PianoMusicGen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PianoMusicGen
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.pianomusicgen.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: PianoMusicGen/Info.plist
    info:
      path: PianoMusicGen/Info.plist
      properties:
        CFBundleName: Piano Music Gen
        CFBundleDisplayName: Piano Music Gen
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSMicrophoneUsageDescription: ""
